name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-dry-run:
    name: cargo publish (dry-run)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned to the workspace rust-version (Cargo.toml: rust-version = "1.81.0").
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81.0"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Dry-run only: validates packaging without publishing. No token is used.
      # Order matters — ncp-zenoh depends on ncp-core, so verify core first.
      - name: Verify ncp-core packaging
        run: cargo publish --dry-run -p ncp-core

      - name: Verify ncp-zenoh packaging
        run: cargo publish --dry-run -p ncp-zenoh

      # Real publishing is enabled later, once crates.io ownership is established
      # and a CARGO_REGISTRY_TOKEN secret is configured. Until then this job is
      # dry-run only and performs no real publish and no token usage.
